# Gofer Pipeline Configuration
# This file configures the autonomous behavior of the Gofer pipeline

pipeline:
  # AUTO-APPROVE TASKS
  # When true, skips the approval gate after task generation
  # Pipeline will auto-chain directly to implementation
  auto_approve_tasks: true

  # AUTO-CHAIN STAGES
  # When true, each stage auto-invokes the next without asking
  auto_chain: true

  # REVIEW TIMING
  # When to run engineering reviews:
  # - "after_each_stage": Review after each stage (interrupts flow)
  # - "after_implementation": Review only after implementation complete (recommended)
  # - "after_validation": Review after validation stage (most autonomous)
  review_timing: "after_implementation"

  # DECISION POINTS
  # When to ask user for decisions:
  # - "discovery": Ask during discovery phase (recommended - asks upfront)
  # - "per_stage": Ask before each stage (interrupts flow)
  # - "never": Never ask (fully autonomous, risky)
  decision_timing: "discovery"

  # CONTEXT MANAGEMENT
  # Auto-save checkpoints to prevent context degradation
  auto_checkpoint:
    enabled: true
    # Save after N tasks completed
    after_tasks: 10
    # Save at phase boundaries
    after_phases: true

implementation:
  # Sub-agent strategy for implementation
  use_subagents: true

  # How many tasks to complete before checking context health
  context_check_frequency: 5

  # Feedback loop timing
  # - "per_task": Run tests after each task (safest)
  # - "per_phase": Run tests after each phase (faster)
  # - "end": Run tests only at end (fastest, riskiest)
  feedback_loop: "per_phase"

  # Checkpoint strategy
  checkpoint_before:
    - "risky_operations"  # Defined in plan.md risk assessment
    - "phase_start"
    - "refactoring"

validation:
  # Run validation agents
  engineering_review: true
  security_review: true
  performance_review: true
  test_quality_review: true

  # Number of fix cycles before proceeding with warnings
  max_fix_cycles: 3

  # Auto-fix Yellow findings
  auto_fix_yellow: true
