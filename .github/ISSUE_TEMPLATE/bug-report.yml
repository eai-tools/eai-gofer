name: Bug report
description: Report a bug, regression, or broken install/update path
title: '[Bug]: '
labels:
  - bug
body:
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - VS Code
        - Claude Code
        - Codex
        - GitHub Copilot
        - Gemini
        - Docs / site
        - Release / packaging
    validations:
      required: true
  - type: dropdown
    id: roadmap_area
    attributes:
      label: Roadmap area
      description: Choose the closest public Gofer workstream.
      options:
        - Public launch and repo hygiene
        - Onboarding and docs
        - Cross-host install/update parity
        - Release and packaging
        - Community and contributor experience
        - Validation and CI quality
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Gofer version
      placeholder: e.g. 3.4.7
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Share the smallest reliable repro you have.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs or attach screenshots if safe to share.
