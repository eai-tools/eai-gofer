name: Feature request
description: Suggest a new capability, workflow improvement, or host integration enhancement
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is hard, missing, or frustrating today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: surfaces
    attributes:
      label: Most affected surface
      options:
        - VS Code
        - Claude Code
        - Codex
        - GitHub Copilot
        - Gemini
        - Docs / site
        - Release / packaging
        - Cross-platform
    validations:
      required: true
  - type: dropdown
    id: roadmap_area
    attributes:
      label: Roadmap area
      description: Choose the closest public Gofer workstream.
      options:
        - Public launch and repo hygiene
        - Onboarding and docs
        - Cross-host install/update parity
        - Release and packaging
        - Community and contributor experience
        - Validation and CI quality
        - Not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
