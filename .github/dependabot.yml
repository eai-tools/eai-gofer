version: 2

updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Australia/Sydney'
    labels:
      - 'dependencies'
      - 'github-actions'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Australia/Sydney'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
    groups:
      npm-production:
        dependency-type: 'production'
      npm-development:
        dependency-type: 'development'

  - package-ecosystem: 'npm'
    directory: '/extension'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Australia/Sydney'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
      - 'vscode'

  - package-ecosystem: 'npm'
    directory: '/language-server'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Australia/Sydney'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
      - 'language-server'

  - package-ecosystem: 'npm'
    directory: '/extension/language-server'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Australia/Sydney'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
      - 'language-server'

  - package-ecosystem: 'npm'
    directory: '/docs-site'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Australia/Sydney'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
      - 'docs'
