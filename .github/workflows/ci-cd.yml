name: Gofer CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install root dependencies
      run: npm ci

    - name: Install extension dependencies
      working-directory: ./extension
      run: npm ci

    - name: Install language server dependencies
      working-directory: ./language-server
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Build extension
      working-directory: ./extension
      run: npm run compile

    - name: Run unit tests
      run: npm test

    - name: Run integration tests
      run: npm run test:integration
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    - name: Generate test coverage
      run: npm run test:coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info
        fail_ci_if_error: true

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd extension && npm ci
        cd ../language-server && npm ci

    - name: Build project
      run: npm run build

    - name: Install Playwright
      run: npx playwright install --with-deps

    - name: Run E2E tests
      run: npm run test:e2e
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    - name: Upload E2E test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: e2e-test-results
        path: test-results/

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd extension && npm ci
        cd ../language-server && npm ci

    - name: TypeScript type check
      run: |
        npx tsc --noEmit
        cd extension && npx tsc --noEmit
        cd ../language-server && npx tsc --noEmit

    - name: ESLint check
      run: npm run lint

    - name: Prettier format check
      run: npm run format:check

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: typescript, javascript

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  build-extension:
    name: Build VSCode Extension
    runs-on: ubuntu-latest
    needs: [test, lint-and-typecheck]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd extension && npm ci
        cd ../language-server && npm ci

    - name: Build project
      run: npm run build

    - name: Build and package extension
      working-directory: ./extension
      run: |
        npm run compile
        npx @vscode/vsce package

    - name: Upload extension artifact
      uses: actions/upload-artifact@v4
      with:
        name: vscode-extension
        path: extension/*.vsix

  constitutional-validation:
    name: Constitutional Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run constitutional validation
      run: |
        set +e  # Don't exit on error immediately
        EXIT_CODE=0

        # Check for any type usage
        echo "Checking for 'any' types..."
        if find src/ extension/src/ language-server/src/ -name "*.ts" -type f 2>/dev/null | xargs grep -n ": any" 2>/dev/null; then
          echo "❌ Constitutional violation: 'any' types found"
          EXIT_CODE=1
        fi

        # Check for TODO/FIXME comments
        echo "Checking for TODO/FIXME comments..."
        if find src/ extension/src/ language-server/src/ -name "*.ts" -type f 2>/dev/null | xargs grep -n -E "TODO|FIXME" 2>/dev/null; then
          echo "⚠️  Warning: TODO/FIXME comments found"
        fi

        # Check for hardcoded secrets patterns
        echo "Checking for hardcoded secrets..."
        if find src/ extension/src/ language-server/src/ -name "*.ts" -type f 2>/dev/null | xargs grep -n -E "(password|secret|key)\s*=" 2>/dev/null | grep -v "process.env"; then
          echo "❌ Constitutional violation: Potential hardcoded secrets"
          EXIT_CODE=1
        fi

        # Check function length (basic check for functions > 50 lines)
        echo "Checking function lengths..."
        find src/ extension/src/ language-server/src/ -name "*.ts" -type f 2>/dev/null -exec awk '
          /^[[:space:]]*function|^[[:space:]]*async function|^[[:space:]]*const.*=.*function|=.*=>/ {
            start=NR; func_name=$0
          }
          /^[[:space:]]*}[[:space:]]*$/ && start {
            if (NR - start > 50) {
              print FILENAME ":" start ": Function too long (" (NR-start) " lines): " func_name
            }
            start=0
          }
        ' {} \; 2>/dev/null

        if [ $EXIT_CODE -eq 0 ]; then
          echo "✅ Constitutional validation passed"
        else
          echo "❌ Constitutional validation failed"
        fi

        exit $EXIT_CODE

  deployment:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test, e2e-tests, lint-and-typecheck, security-scan, build-extension, constitutional-validation]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Download extension artifact
      uses: actions/download-artifact@v4
      with:
        name: vscode-extension
        path: ./extension

    - name: Publish to VS Code Marketplace
      if: startsWith(github.ref, 'refs/tags/v')
      working-directory: ./extension
      run: |
        npx @vscode/vsce publish --pat ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}
      env:
        VSCODE_MARKETPLACE_TOKEN: ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}

    - name: Get version from tag
      if: startsWith(github.ref, 'refs/tags/v')
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Find VSIX file
      if: startsWith(github.ref, 'refs/tags/v')
      id: find_vsix
      run: |
        VSIX_FILE=$(ls ./extension/*.vsix | head -n 1)
        echo "VSIX_PATH=$VSIX_FILE" >> $GITHUB_OUTPUT
        echo "VSIX_NAME=$(basename $VSIX_FILE)" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      id: create_release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Gofer Release ${{ steps.get_version.outputs.VERSION }}

          ### New Features
          - Autonomous development workflow
          - Constitutional code validation
          - MCP tool integration with Claude Code

          ### Installation
          Download the .vsix file and install via:
          ```
          code --install-extension ${{ steps.find_vsix.outputs.VSIX_NAME }}
          ```
        draft: false
        prerelease: false
        files: ${{ steps.find_vsix.outputs.VSIX_PATH }}

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, e2e-tests, lint-and-typecheck, security-scan, constitutional-validation]
    if: failure()
    
    steps:
    - name: Send Slack notification
      if: ${{ vars.SLACK_NOTIFICATIONS_ENABLED == 'true' }}
      run: |
        if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H 'Content-Type: application/json' \
          -d '{
            "text": "🚨 Gofer CI/CD Pipeline Failed!",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Gofer CI/CD Pipeline Failed!*\n\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n\nPlease check the GitHub Actions logs for details."
                }
              }
            ]
          }'
        fi

    - name: Send SMS notification (if configured)
      if: ${{ vars.SMS_NOTIFICATIONS_ENABLED == 'true' }}
      run: |
        if [ -n "${{ secrets.TWILIO_ACCOUNT_SID }}" ]; then
          curl -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Messages.json" \
          --data-urlencode "From=${{ secrets.TWILIO_PHONE_NUMBER }}" \
          --data-urlencode "To=${{ secrets.YOUR_PHONE_NUMBER }}" \
          --data-urlencode "Body=🚨 Gofer CI/CD failed on ${{ github.ref }}. Check GitHub Actions." \
          -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}"
        fi