name: Gofer Goal Rebaseline

on:
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:
    inputs:
      feature_dir:
        description: 'Optional feature directory under .specify/specs/ to audit'
        required: false
        type: string
      strict:
        description: 'Fail the workflow when drift or missing evidence is found'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '24.x'

jobs:
  rebaseline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run closed-loop goal audit
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p quality-reports/goal-rebaseline
          strict_flag=""
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.strict || false }}" = "true" ]; then
            strict_flag="--strict"
          fi

          feature_arg="${{ github.event_name == 'workflow_dispatch' && inputs.feature_dir || '' }}"
          feature_dirs=()
          if [ -n "$feature_arg" ]; then
            feature_dirs+=("$feature_arg")
          else
            while IFS= read -r feature_dir; do
              feature_dirs+=("$feature_dir")
            done < <(find .specify/specs -mindepth 1 -maxdepth 1 -type d ! -name '_*' | sort)
          fi

          if [ "${#feature_dirs[@]}" -eq 0 ]; then
            cat > quality-reports/goal-rebaseline/summary.md <<'EOF'
          # Goal Rebaseline Summary

          No active feature directories were found under `.specify/specs/`.
          EOF
            exit 0
          fi

          overall_exit=0
          {
            echo "# Goal Rebaseline Summary"
            echo
          } > quality-reports/goal-rebaseline/summary.md

          for feature_dir in "${feature_dirs[@]}"; do
            feature_name="$(basename "$feature_dir")"
            json_path="quality-reports/goal-rebaseline/${feature_name}.json"
            report_path="quality-reports/goal-rebaseline/${feature_name}.md"

            set +e
            node .specify/scripts/node/gofer-closed-loop-audit.mjs \
              --feature-dir "$feature_dir" \
              --json \
              $strict_flag \
              --report "$report_path" > "$json_path"
            audit_exit=$?
            set -e

            node --input-type=module - "$json_path" "$feature_name" <<'EOF' >> quality-reports/goal-rebaseline/summary.md
            import fs from 'node:fs';
            const [jsonPath, featureName] = process.argv.slice(2);
            const audit = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
            const findings = [...audit.blockingFindings, ...audit.driftFindings, ...audit.warnings]
              .slice(0, 3)
              .map((finding) => `${finding.source}: ${finding.message}`);
            console.log(`## ${featureName}`);
            console.log();
            console.log(`- Status: \`${audit.status}\``);
            console.log(
              `- Recommended start stage: \`${audit.recommendedStartStage || 'none'}\``
            );
            if (findings.length > 0) {
              console.log(`- Top findings: ${findings.join(' | ')}`);
            } else {
              console.log('- Top findings: none');
            }
            console.log();
            EOF

            if [ "$audit_exit" -ne 0 ]; then
              overall_exit=$audit_exit
            fi
          done

          exit "$overall_exit"

      - name: Upload goal rebaseline reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: goal-rebaseline-${{ github.run_number }}
          path: quality-reports/goal-rebaseline/
          retention-days: 14
