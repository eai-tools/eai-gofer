name: Issue Intake And Prep PR

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage and prepare'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: issue-intake-${{ github.event.issue.number || inputs.issue_number || github.run_id }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  triage-and-prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve issue payload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            gh issue view "${{ inputs.issue_number }}" --json number,title,body,url,labels > issue.json
          else
            node --input-type=module <<'EOF'
            import fs from 'node:fs';
            const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, 'utf8'));
            fs.writeFileSync('issue.json', JSON.stringify(event.issue, null, 2));
            EOF
          fi

      - name: Analyze issue against roadmap
        id: analyze
        run: |
          node scripts/github/issue-intake-cli.mjs analyze \
            --issue issue.json \
            --policy .github/gofer-roadmap.json \
            --out analysis.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Ensure intake labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const policy = JSON.parse(fs.readFileSync('.github/gofer-roadmap.json', 'utf8'));
            const labelSpecs = [
              { name: policy.statusLabels.triage, color: 'D4C5F9', description: 'Queued for automated roadmap triage' },
              { name: policy.statusLabels.roadmapFit, color: '0E8A16', description: 'Aligned with the active Gofer roadmap' },
              { name: policy.statusLabels.needsHumanTriage, color: 'FBCA04', description: 'Needs a maintainer to confirm scope or routing' },
              { name: policy.statusLabels.outOfRoadmap, color: 'BFDADC', description: 'Not aligned strongly enough with the current Gofer roadmap' },
              { name: policy.statusLabels.prepPr, color: '5319E7', description: 'Automation prepared or updated a draft intake PR' },
              ...policy.areas.map((area) => ({
                name: area.label,
                color: '1D76DB',
                description: `Roadmap area: ${area.title}`,
              })),
            ];

            for (const spec of labelSpecs) {
              const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
              try {
                await github.rest.issues.getLabel({ owner, repo, name: spec.name });
                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: spec.name,
                  new_name: spec.name,
                  color: spec.color,
                  description: spec.description,
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: spec.name,
                    color: spec.color,
                    description: spec.description,
                  });
                } else {
                  throw error;
                }
              }
            }

      - name: Apply triage labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          issue_number=$(jq -r '.issueNumber' analysis.json)
          add_labels=$(jq -r '.labelsToAdd | join(",")' analysis.json)
          remove_labels=$(jq -r '.labelsToRemove | join(",")' analysis.json)

          if [ -n "$add_labels" ]; then
            gh issue edit "$issue_number" --add-label "$add_labels"
          fi

          if [ -n "$remove_labels" ]; then
            gh issue edit "$issue_number" --remove-label "$remove_labels" || true
          fi

      - name: Prepare draft intake PR branch
        id: prep_pr
        if: steps.analyze.outputs.should_prepare_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          issue_number=$(jq -r '.issueNumber' analysis.json)
          branch_name=$(jq -r '.branchName' analysis.json)
          prep_file_path=$(jq -r '.prepFilePath' analysis.json)
          pr_title=$(jq -r '.prTitle' analysis.json)
          area_title=$(jq -r '.areaTitle' analysis.json)
          surface=$(jq -r '.surface' analysis.json)
          summary=$(jq -r '.summary' analysis.json)
          reason=$(jq -r '.reason' analysis.json)
          issue_url=$(jq -r '.url' analysis.json)

          node scripts/github/issue-intake-cli.mjs render-brief \
            --issue issue.json \
            --policy .github/gofer-roadmap.json \
            --out "$prep_file_path" > /dev/null

          cat > issue-pr-body.md <<EOF
          ## Summary

          Prepare a roadmap-aligned intake brief for #$issue_number.

          ## Why

          Relates to #$issue_number.

          This draft PR is automation-generated so a human reviewer can confirm scope and roadmap fit before implementation work starts.

          ## Triage Result

          - Status: \`$summary\`
          - Area: \`$area_title\`
          - Surface: \`$surface\`
          - Reason: $reason

          ## Included

          - Generated intake brief: \`$prep_file_path\`
          - Related issue: $issue_url

          ## Human Review Checklist

          - [ ] Confirm the issue is in line with the active Gofer roadmap
          - [ ] Confirm the suggested surface area and acceptance signals
          - [ ] Decide whether this should proceed to implementation, be refined, or be closed
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "$branch_name" "origin/$DEFAULT_BRANCH"

          git add "$prep_file_path" .github/issue-prep/README.md
          git commit -m "chore(issue-prep): prepare #$issue_number" || true
          git push --force-with-lease origin "$branch_name"

          pr_url=$(gh pr list --head "$branch_name" --base "$DEFAULT_BRANCH" --json url --jq '.[0].url')
          if [ -z "$pr_url" ] || [ "$pr_url" = "null" ]; then
            pr_url=$(gh pr create \
              --draft \
              --base "$DEFAULT_BRANCH" \
              --head "$branch_name" \
              --title "$pr_title" \
              --body-file issue-pr-body.md)
          else
            gh pr edit "$pr_url" --title "$pr_title" --body-file issue-pr-body.md
          fi

          echo "prep_pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Render triage comment
        env:
          PREP_PR_URL: ${{ steps.prep_pr.outputs.prep_pr_url }}
        run: |
          node scripts/github/issue-intake-cli.mjs render-comment \
            --issue issue.json \
            --policy .github/gofer-roadmap.json \
            --prep-pr-url "$PREP_PR_URL" \
            --out triage-comment.md > /dev/null

      - name: Upsert triage comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('triage-comment.md', 'utf8');
            const issue = JSON.parse(fs.readFileSync('issue.json', 'utf8'));
            const marker = '<!-- gofer-issue-intake -->';
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body,
              });
            }
