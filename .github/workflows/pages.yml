name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '.tech-docs/**'
      - 'docs-site/**'
      - 'scripts/update-releases.js'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs-site dependencies
        run: cd docs-site && npm ci

      - name: Build Docusaurus docs site
        run: cd docs-site && npm run build

      - name: Verify generated site
        run: |
          REQUIRED_FILES=(
            "docs-site/build/index.html"
            "docs-site/build/docs/overview.html"
            "docs-site/build/releases.html"
            "docs-site/build/releases.json"
            "docs-site/build/releases/eai-gofer-latest.vsix"
            "docs-site/build/releases/eai-gofer-agent-plugin-latest.zip"
            "docs-site/build/releases/plugins/eai-gofer/claude-marketplace.json"
            "docs-site/build/releases/plugins/eai-gofer/codex-plugin.json"
            "docs-site/build/releases/plugins/eai-gofer/gemini-extension.json"
            "docs-site/build/releases/plugins/eai-gofer/gemini-commands-manifest.json"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Required file $file is missing!"
              exit 1
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs-site/build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
