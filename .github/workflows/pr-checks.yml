name: Pull Request Checks

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # Quick validation for PRs
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    timeout-minutes: 8
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Quick Build Check
      run: npm run build
      
    - name: Run Fast Tests
      run: npm test -- --reporter=line
      env:
        CI: true
        
    - name: TypeScript Check
      run: npx tsc --noEmit
      
    - name: PR Size Check
      run: |
        files_changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
        lines_changed=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | sed 's/.*changed, //' | sed 's/ insertion.*//' | sed 's/ deletion.*//')
        
        echo "Files changed: $files_changed"
        echo "Lines changed: $lines_changed"
        
        if [ "$files_changed" -gt 50 ]; then
          echo "⚠️ Large PR: $files_changed files changed. Consider breaking into smaller PRs."
        fi
        
        if [ "${lines_changed:-0}" -gt 1000 ]; then
          echo "⚠️ Large PR: $lines_changed lines changed. Consider breaking into smaller PRs."
        fi

  # Comment on PR with test results
  pr-comment:
    name: PR Test Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: pr-validation
    if: always()
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Run Tests and Generate Report
      id: test-report
      run: |
        npm test 2>&1 | tee test-output.txt
        
        # Extract test results
        if grep -q "tests passed" test-output.txt; then
          passed=$(grep -o '[0-9]\+ passed' test-output.txt | grep -o '[0-9]\+' | head -1)
          failed=$(grep -o '[0-9]\+ failed' test-output.txt | grep -o '[0-9]\+' | head -1 || echo "0")
          total=$((passed + failed))
          
          echo "TESTS_PASSED=$passed" >> $GITHUB_OUTPUT
          echo "TESTS_FAILED=$failed" >> $GITHUB_OUTPUT
          echo "TESTS_TOTAL=$total" >> $GITHUB_OUTPUT
          
          if [ "$failed" -eq 0 ]; then
            echo "TEST_STATUS=✅ All tests passed!" >> $GITHUB_OUTPUT
          else
            echo "TEST_STATUS=❌ $failed tests failed" >> $GITHUB_OUTPUT
          fi
        else
          echo "TEST_STATUS=❌ Tests failed to run" >> $GITHUB_OUTPUT
        fi
      continue-on-error: true
      env:
        CI: true
        
    - name: Comment PR
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const testStatus = '${{ steps.test-report.outputs.TEST_STATUS }}';
          const testsPassed = '${{ steps.test-report.outputs.TESTS_PASSED }}';
          const testsFailed = '${{ steps.test-report.outputs.TESTS_FAILED }}';
          const testsTotal = '${{ steps.test-report.outputs.TESTS_TOTAL }}';
          
          const comment = `## 🧪 Test Results for PR #${{ github.event.number }}
          
${testStatus}

**Test Summary:**
- Passed: ${testsPassed || 'N/A'}
- Failed: ${testsFailed || 'N/A'}  
- Total: ${testsTotal || 'N/A'}

**Build Status:**
- ${{ needs.pr-validation.result == 'success' && '✅ Build: Successful' || '❌ Build: Failed' }}
- ${{ needs.pr-validation.result == 'success' && '✅ TypeScript: No errors' || '❌ TypeScript: Errors found' }}

Automated by SpecGofer CI/CD Pipeline`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  # Auto-assign reviewers for certain types of changes
  auto-assign:
    name: Auto-assign Reviewers
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event.action == 'opened'
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Check Changed Files and Auto-assign
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { execSync } = require('child_process');
          
          // Get changed files
          const changedFiles = execSync(`git diff --name-only origin/${{ github.base_ref }}...HEAD`, { encoding: 'utf-8' }).split('\n').filter(Boolean);
          
          console.log('Changed files:', changedFiles);
          
          let reviewers = [];
          let labels = [];
          
          // Auto-assign based on changed files
          if (changedFiles.some(file => file.includes('.github/workflows'))) {
            labels.push('ci/cd');
          }
          
          if (changedFiles.some(file => file.includes('tests/'))) {
            labels.push('testing');
          }
          
          if (changedFiles.some(file => file.includes('extension/'))) {
            labels.push('vscode-extension');
          }
          
          if (changedFiles.some(file => file.includes('language-server/'))) {
            labels.push('language-server');
          }
          
          if (changedFiles.some(file => file.includes('src/'))) {
            labels.push('orchestrator');
          }
          
          if (changedFiles.some(file => file.includes('.specify/'))) {
            labels.push('specification');
          }
          
          // Add labels
          if (labels.length > 0) {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
          }
          
          console.log('Added labels:', labels);