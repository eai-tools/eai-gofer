name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v2.0.5'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_VERSION: '24.x'

concurrency:
  group: release-${{ github.ref_name || inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            extension/package-lock.json
            language-server/package-lock.json

      - name: Resolve Release Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw_version="${{ inputs.version }}"
          else
            raw_version="${GITHUB_REF_NAME}"
          fi

          tag_name="${raw_version#refs/tags/}"
          if [[ "$tag_name" != v* ]]; then
            tag_name="v$tag_name"
          fi

          {
            echo "tag_name=$tag_name"
            echo "version=${tag_name#v}"
          } >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.prerelease }}" = "true" ]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Dependencies
        run: |
          npm ci
          npm --prefix extension ci
          npm --prefix language-server ci

      - name: Regenerate Command Surfaces
        run: npm run gofer:generate

      - name: Run Tests
        run: npm test
        env:
          CI: true

      - name: Build Components
        run: |
          npm run build
          npm --prefix extension run compile
          npm --prefix language-server run build

      - name: Package VS Code Extension
        working-directory: ./extension
        run: npx @vscode/vsce package --out "eai-gofer-${{ steps.version.outputs.version }}.vsix"

      - name: Package Agent Plugin
        run: npm run gofer:package-plugin -- --version "${{ steps.version.outputs.version }}" --sync-repo

      - name: Publish VS Code Marketplace Extension
        working-directory: ./extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          IS_PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "Skipping VS Code Marketplace publish for prerelease."
            exit 0
          fi

          if [ -z "$VSCE_PAT" ]; then
            echo "Skipping VS Code Marketplace publish because VSCE_PAT is not configured."
            exit 0
          fi

          npx @vscode/vsce publish --packagePath "eai-gofer-${{ steps.version.outputs.version }}.vsix" -p "$VSCE_PAT"

      - name: Create Release Archive
        run: |
          mkdir -p release-assets/orchestrator release-assets/extension release-assets/language-server

          cp -R dist/. release-assets/orchestrator/
          cp -R extension/dist/. release-assets/extension/
          cp -R language-server/dist/. release-assets/language-server/
          cp "extension/eai-gofer-${{ steps.version.outputs.version }}.vsix" release-assets/
          cp "dist/eai-gofer-agent-plugin-${{ steps.version.outputs.version }}.zip" release-assets/
          cp README.md CHANGELOG.md LICENSE release-assets/

          tar -czf "gofer-${{ steps.version.outputs.tag_name }}.tar.gz" release-assets/

      - name: Generate Release Notes
        run: |
          tag_name="${{ steps.version.outputs.tag_name }}"

          {
            echo "# Gofer $tag_name"
            echo
            echo "## Changes"
            echo
          } > release-notes.md

          if git describe --tags --abbrev=0 HEAD~1 >/dev/null 2>&1; then
            last_tag="$(git describe --tags --abbrev=0 HEAD~1)"
            echo "Changes since $last_tag:" >> release-notes.md
            git log --pretty=format:"- %s" "$last_tag"..HEAD >> release-notes.md
          else
            echo "- Initial release" >> release-notes.md
          fi

          {
            echo
            echo "## Assets"
            echo
            echo "- VS Code extension package"
            echo "- Claude/Codex/Copilot agent plugin package"
            echo "- Gofer release archive"
            echo
            echo "## Local Agent Plugin Install"
            echo
            echo '```bash'
            echo "gh release download $tag_name \\"
            echo "  --repo eai-tools/eai-gofer \\"
            echo "  --pattern \"eai-gofer-agent-plugin-${{ steps.version.outputs.version }}.zip\" \\"
            echo "  --dir /tmp/eai-gofer-plugin"
            echo
            echo "rm -rf ~/plugins/eai-gofer"
            echo "unzip /tmp/eai-gofer-plugin/eai-gofer-agent-plugin-${{ steps.version.outputs.version }}.zip -d ~/plugins"
            echo '```'
            echo
            echo "Claude Code:"
            echo
            echo '```bash'
            echo "claude plugin marketplace add ~/plugins/eai-gofer --scope user"
            echo "claude plugin install eai-gofer@eai-gofer-local --scope user"
            echo '```'
            echo
            echo "Copilot CLI:"
            echo
            echo '```bash'
            echo "copilot plugin marketplace add ~/plugins/eai-gofer"
            echo "copilot plugin install eai-gofer@eai-gofer-local"
            echo "copilot plugin marketplace add eai-tools/eai-gofer"
            echo "copilot plugin install eai-gofer@eai-gofer"
            echo '```'
          } >> release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Gofer ${{ steps.version.outputs.tag_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            gofer-${{ steps.version.outputs.tag_name }}.tar.gz
            extension/eai-gofer-${{ steps.version.outputs.version }}.vsix
            dist/eai-gofer-agent-plugin-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
