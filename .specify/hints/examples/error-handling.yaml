# Example: Error Handling Pattern Hint
#
# This hint provides guidance on robust error handling.
# Use this as a template for error handling best practices.

context:
  applies_to: ['*']
  priority: 6

guidance: |
  **Error Handling Best Practices**

  1. Use TypeScript's type system:
     - Avoid `any` type for errors
     - Use `unknown` for caught errors
     - Define custom error types

  2. Validate inputs early:
     - Check parameters at function entry
     - Throw descriptive errors for invalid input
     - Use schema validation for complex data

  3. Provide context in errors:
     - Include relevant data in error messages
     - Use structured error objects
     - Log errors with appropriate severity

  4. Handle async errors properly:
     - Always use try/catch with async/await
     - Handle promise rejections
     - Clean up resources in finally blocks

  5. Log errors comprehensively:
     - Use Logger.for() for component-specific logging
     - Include error context and stack traces
     - Log at appropriate level (error, warn, debug)

examples:
  - |
    // Example: Custom error types
    export class ValidationError extends Error {
      constructor(
        message: string,
        public readonly field: string,
        public readonly value: unknown
      ) {
        super(message);
        this.name = 'ValidationError';
      }
    }

    export class NotFoundError extends Error {
      constructor(
        message: string,
        public readonly resourceId: string
      ) {
        super(message);
        this.name = 'NotFoundError';
      }
    }

  - |
    // Example: Input validation
    function processUser(userId: string): User {
      if (!userId || typeof userId !== 'string') {
        throw new ValidationError(
          'Invalid user ID',
          'userId',
          userId
        );
      }

      if (userId.length === 0) {
        throw new ValidationError(
          'User ID cannot be empty',
          'userId',
          userId
        );
      }

      // Process user...
    }

  - |
    // Example: Async error handling with logging
    import { Logger } from '../utils/logger';

    export class UserService {
      private readonly logger = Logger.for('UserService');

      async getUser(id: string): Promise<User> {
        this.logger.debug('Fetching user', { id });

        try {
          const user = await this.repository.findById(id);

          if (!user) {
            throw new NotFoundError('User not found', id);
          }

          this.logger.info('User fetched successfully', { id });
          return user;

        } catch (error) {
          if (error instanceof NotFoundError) {
            this.logger.warn('User not found', { id });
            throw error;
          }

          this.logger.error('Failed to fetch user', { id }, error);
          throw new Error(`Failed to fetch user: ${error}`);
        }
      }
    }

  - |
    // Example: Resource cleanup
    async function processFile(filePath: string): Promise<void> {
      let fileHandle: FileHandle | null = null;

      try {
        fileHandle = await fs.open(filePath, 'r');
        const content = await fileHandle.readFile('utf-8');
        await processContent(content);

      } catch (error) {
        logger.error('File processing failed', { filePath }, error);
        throw error;

      } finally {
        // Always close file handle
        if (fileHandle) {
          await fileHandle.close();
        }
      }
    }

