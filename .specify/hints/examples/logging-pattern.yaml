# Example: Logging Pattern Hint
#
# This hint provides guidance on structured logging.
# Specific to SpecGofer's Logger utility.

context:
  applies_to: ['*']
  priority: 7

guidance: |
  **Logging Best Practices with SpecGofer Logger**

  1. Use component-specific loggers:
     - Use `Logger.for('ComponentName')` pattern
     - Create logger as private readonly field
     - Initialize in constructor

  2. Choose appropriate log levels:
     - **debug**: Development details, verbose info
     - **info**: Normal operations, milestones
     - **warn**: Recoverable issues, degraded performance
     - **error**: Failures, exceptions

  3. Include structured data:
     - Pass objects with relevant context
     - Include performance metrics (duration, count)
     - Add operation identifiers (id, sessionId)

  4. Log at strategic points:
     - Initialization (debug level with config)
     - Operation start (debug level)
     - Operation completion (info level with metrics)
     - Errors and warnings (error/warn level with context)

  5. Don't log sensitive data:
     - Never log passwords, tokens, API keys
     - Redact PII (emails, phone numbers)
     - Use IDs instead of full objects

examples:
  - |
    // Example: Component with structured logging

    import { Logger } from '../utils/logger';

    export class UserService {
      private readonly logger: Logger;

      constructor(private readonly repository: UserRepository) {
        this.logger = Logger.for('UserService');
        this.logger.debug('UserService initialized', {
          repositoryType: repository.constructor.name,
        });
      }

      async createUser(email: string, name: string): Promise<User> {
        this.logger.debug('Creating user', { email }); // Note: email ok for debug

        const startTime = Date.now();

        try {
          const user = await this.repository.create({ email, name });
          const duration = Date.now() - startTime;

          this.logger.info('User created successfully', {
            userId: user.id,
            duration,
          });

          return user;

        } catch (error) {
          this.logger.error(
            'Failed to create user',
            { email },
            error
          );
          throw error;
        }
      }
    }

  - |
    // Example: Logging with performance metrics

    async compact(session: Session): Promise<CompactionSummary> {
      this.logger.info('Starting context compaction', {
        sessionId: session.id,
        completedTasks: session.completedTasks.length,
      });

      const startTime = Date.now();

      // ... compaction logic ...

      const duration = Date.now() - startTime;
      const reductionPercent = Math.round((tokensSaved / tokensBefore) * 100);

      this.logger.info('Context compaction completed', {
        sessionId: session.id,
        tasksCompacted: compactedTaskIds.length,
        tasksPreserved: preservedTaskIds.length,
        tokensSaved,
        reductionPercent,
        duration,
      });

      return summary;
    }

  - |
    // Example: Logging errors with context

    async loadHint(hintPath: string): Promise<Hint | null> {
      this.logger.debug('Loading hint file', { hintPath });

      try {
        const content = await fs.readFile(hintPath, 'utf-8');
        const hint = yaml.parse(content);

        this.logger.debug('Hint loaded successfully', {
          hintPath,
          priority: hint.context.priority,
        });

        return hint;

      } catch (error) {
        if (error.code === 'ENOENT') {
          this.logger.warn('Hint file not found', { hintPath });
          return null;
        }

        this.logger.error(
          'Failed to load hint file',
          { hintPath },
          error
        );
        throw error;
      }
    }

  - |
    // Example: Redacting sensitive data

    async authenticate(username: string, password: string): Promise<Token> {
      // ❌ Bad: Logging password
      this.logger.debug('Authenticating user', { username, password });

      // ✅ Good: Omit password
      this.logger.debug('Authenticating user', { username });

      try {
        const token = await this.authService.login(username, password);

        // ❌ Bad: Logging full token
        this.logger.info('Authentication successful', { token });

        // ✅ Good: Log token ID or masked value
        this.logger.info('Authentication successful', {
          username,
          tokenId: token.id,
          expiresIn: token.expiresIn,
        });

        return token;

      } catch (error) {
        this.logger.warn('Authentication failed', { username });
        throw error;
      }
    }

  - |
    // Example: Logger mock in tests

    import { vi } from 'vitest';

    // In tests/helpers/setup.ts
    vi.mock('../../extension/src/utils/logger', () => ({
      Logger: {
        getInstance: vi.fn(() => ({
          debug: vi.fn(),
          info: vi.fn(),
          warn: vi.fn(),
          error: vi.fn(),
          exception: vi.fn(),
        })),
        for: vi.fn(() => ({
          debug: vi.fn(),
          info: vi.fn(),
          warn: vi.fn(),
          error: vi.fn(),
          exception: vi.fn(),
        })),
      },
      LogLevel: {
        debug: 0,
        info: 1,
        warn: 2,
        error: 3,
      },
    }));

