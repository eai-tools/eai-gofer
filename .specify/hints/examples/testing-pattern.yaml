# Example: Testing Pattern Hint
#
# This hint provides guidance on testing best practices.
# Use this as a template for creating your own testing hints.

context:
  # Applies to all specs (use '*' wildcard)
  applies_to: ['*']

  # Optional: Match specific task IDs (regex supported)
  # task_pattern: 'T1[0-9]{2}'  # Tasks T100-T199

  # Optional: Match specific phases
  # phases: ['implementation', 'testing']

  # Priority: 1-10 (higher = more important)
  # Use 1-5 for general hints, 6-10 for spec-specific
  priority: 5

# Main guidance text (supports markdown)
guidance: |
  **Testing Best Practices**

  1. Follow Test-Driven Development (TDD):
     - Write tests before implementation
     - Red → Green → Refactor cycle

  2. Use Vitest for unit and integration tests:
     - Fast execution with watch mode
     - Native ESM support
     - Built-in mocking with vi.mock()

  3. Aim for high test coverage:
     - Target >90% coverage for new code
     - Focus on critical paths and edge cases
     - Don't test implementation details

  4. Mock external dependencies:
     - Use global mocks in tests/helpers/setup.ts
     - Mock VSCode API for extension tests
     - Mock network calls and file I/O

# Code examples (optional)
examples:
  - |
    // Example: Basic unit test structure
    import { describe, it, expect } from 'vitest';
    import { MyClass } from '../src/MyClass';

    describe('MyClass', () => {
      it('should initialize with default values', () => {
        const instance = new MyClass();
        expect(instance.value).toBe(0);
      });

      it('should handle errors gracefully', () => {
        const instance = new MyClass();
        expect(() => instance.process(null)).toThrow();
      });
    });

  - |
    // Example: Mocking in tests
    import { vi } from 'vitest';

    vi.mock('../src/service', () => ({
      fetchData: vi.fn(() => Promise.resolve({ data: 'mock' })),
    }));

    it('should use mocked service', async () => {
      const result = await fetchData();
      expect(result.data).toBe('mock');
    });

# Related resources (optional)
resources:
