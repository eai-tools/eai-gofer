# Example: TypeScript Patterns Hint
#
# This hint provides guidance on TypeScript best practices and patterns.
# Use this as a template for language-specific hints.

context:
  applies_to: ['*']
  priority: 4

guidance: |
  **TypeScript Best Practices**

  1. Use explicit types:
     - Avoid `any` type (use `unknown` instead)
     - Define return types for all functions
     - Use type inference where appropriate

  2. Leverage TypeScript features:
     - Use interfaces for contracts
     - Use type aliases for unions/intersections
     - Use const assertions for literal types
     - Use generics for reusable code

  3. Organize types properly:
     - Define types in separate files (e.g., types.ts)
     - Export types for external use
     - Use namespaces sparingly

  4. Follow naming conventions:
     - Interfaces: PascalCase (e.g., UserService)
     - Type aliases: PascalCase (e.g., UserId)
     - Enums: PascalCase (e.g., LogLevel)
     - Generic parameters: Single uppercase letter (T, K, V)

  5. Use strict compiler options:
     - Enable `strict: true` in tsconfig.json
     - Enable `noImplicitAny`
     - Enable `strictNullChecks`

examples:
  - |
    // Example: Interface vs Type Alias

    // Use interface for object contracts
    interface User {
      id: string;
      name: string;
      email: string;
    }

    // Use type alias for unions, intersections, primitives
    type UserId = string;
    type UserRole = 'admin' | 'user' | 'guest';
    type AdminUser = User & { role: 'admin'; permissions: string[] };

  - |
    // Example: Explicit return types

    // ✅ Good: Explicit return type
    function getUser(id: string): User | null {
      return users.find(u => u.id === id) ?? null;
    }

    // ❌ Bad: Implicit return type
    function getUser(id: string) {
      return users.find(u => u.id === id) ?? null;
    }

  - |
    // Example: Avoiding 'any'

    // ❌ Bad: Using 'any'
    function processData(data: any): void {
      console.log(data.value);
    }

    // ✅ Good: Using 'unknown' with type guards
    function processData(data: unknown): void {
      if (isDataObject(data)) {
        console.log(data.value);
      }
    }

    function isDataObject(value: unknown): value is { value: string } {
      return (
        typeof value === 'object' &&
        value !== null &&
        'value' in value &&
        typeof (value as { value: unknown }).value === 'string'
      );
    }

  - |
    // Example: Generics for reusable code

    interface Repository<T> {
      findById(id: string): Promise<T | null>;
      save(entity: T): Promise<T>;
      delete(id: string): Promise<void>;
    }

    class UserRepository implements Repository<User> {
      async findById(id: string): Promise<User | null> {
        // Implementation
      }

      async save(user: User): Promise<User> {
        // Implementation
      }

      async delete(id: string): Promise<void> {
        // Implementation
      }
    }

  - |
    // Example: Const assertions for literal types

    // Without const assertion (type is string[])
    const colors1 = ['red', 'green', 'blue'];

    // With const assertion (type is readonly ['red', 'green', 'blue'])
    const colors2 = ['red', 'green', 'blue'] as const;
    type Color = typeof colors2[number]; // 'red' | 'green' | 'blue'

  - |
    // Example: Discriminated unions

    type Success<T> = {
      status: 'success';
      data: T;
    };

    type Error = {
      status: 'error';
      message: string;
    };

    type Result<T> = Success<T> | Error;

    function handleResult<T>(result: Result<T>): void {
      if (result.status === 'success') {
        // TypeScript knows result.data exists here
        console.log(result.data);
      } else {
        // TypeScript knows result.message exists here
        console.error(result.message);
      }
    }

