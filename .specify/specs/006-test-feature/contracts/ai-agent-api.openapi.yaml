openapi: 3.1.0
info:
  title: SpecGofer Test Orchestration API for AI Agents
  description: API for AI agents to execute and monitor Dagger test pipelines
  version: 1.0.0
  contact:
    name: SpecGofer Team
    url: https://github.com/specgofer/specgofer
servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
  - url: https://api.specgofer.dev/v1
    description: Production API
security:
  - apiKey: []
  - mcp: []
paths:
  /pipelines:
    get:
      operationId: listPipelines
      summary: List available test pipelines
      description: Returns all configured Dagger pipelines available for execution
      tags:
        - Pipelines
      responses:
        '200':
          description: List of pipelines
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipelines:
                    type: array
                    items:
                      $ref: '#/components/schemas/PipelineSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /pipelines/{pipelineId}/execute:
    post:
      operationId: executePipeline
      summary: Execute a test pipeline
      description: Triggers execution of a Dagger test pipeline with optional parameters
      tags:
        - Pipelines
      parameters:
        - name: pipelineId
          in: path
          required: true
          schema:
            type: string
          description: Pipeline identifier
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                branch:
                  type: string
                  description: Git branch to test
                  default: main
                testFilter:
                  type: string
                  description: Filter pattern for test selection
                parallel:
                  type: boolean
                  description: Enable parallel execution
                  default: true
                environment:
                  type: object
                  description: Environment variable overrides
                  additionalProperties:
                    type: string
                metadata:
                  type: object
                  description: Additional metadata for tracking
                  additionalProperties: true
      responses:
        '202':
          description: Pipeline execution started
          content:
            application/json:
              schema:
                type: object
                required:
                  - executionId
                  - status
                properties:
                  executionId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [pending, running]
                  estimatedDuration:
                    type: integer
                    description: Estimated duration in seconds
                  streamUrl:
                    type: string
                    format: uri
                    description: SSE endpoint for progress updates
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /executions/{executionId}:
    get:
      operationId: getExecution
      summary: Get execution details
      description: Returns current status and details of a pipeline execution
      tags:
        - Executions
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Execution details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /executions/{executionId}/cancel:
    post:
      operationId: cancelExecution
      summary: Cancel a running execution
      description: Attempts to cancel a running pipeline execution
      tags:
        - Executions
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Cancellation reason
      responses:
        '200':
          description: Execution cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [cancelled, cancelling]
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /executions/{executionId}/results:
    get:
      operationId: getTestResults
      summary: Get test results
      description: Returns detailed test results for a completed execution
      tags:
        - Results
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: format
          in: query
          schema:
            type: string
            enum: [json, junit, html]
            default: json
          description: Result format
      responses:
        '200':
          description: Test results
          content:
            application/json:
              schema:
                $ref: 'test-result.schema.json'
            application/xml:
              schema:
                type: string
                description: JUnit XML format
            text/html:
              schema:
                type: string
                description: HTML report
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '425':
          description: Too Early - execution not complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /executions/{executionId}/artifacts:
    get:
      operationId: listArtifacts
      summary: List execution artifacts
      description: Returns list of artifacts produced by the execution
      tags:
        - Artifacts
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            type: string
            enum: [log, report, coverage, screenshot, video]
          description: Filter by artifact type
      responses:
        '200':
          description: List of artifacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Artifact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /executions/{executionId}/artifacts/{artifactId}:
    get:
      operationId: downloadArtifact
      summary: Download an artifact
      description: Downloads a specific artifact file
      tags:
        - Artifacts
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: artifactId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact file
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /executions/{executionId}/stream:
    get:
      operationId: streamProgress
      summary: Stream execution progress
      description: Server-sent events stream for real-time progress updates
      tags:
        - Streaming
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE stream of progress updates
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-sent events
                example: |
                  event: test:start
                  data: {"phase":"setup","timestamp":"2025-11-02T10:00:00Z"}

                  event: test:progress
                  data: {"progress":25,"currentTest":"extension-commands","testsCompleted":10,"testsTotal":40}

                  event: test:complete
                  data: {"status":"passed","duration":180000}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /test-data:
    get:
      operationId: listTestData
      summary: List available test data sets
      description: Returns all configured test data sets for pipeline execution
      tags:
        - Test Data
      parameters:
        - name: tags
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by tags
      responses:
        '200':
          description: List of test data sets
          content:
            application/json:
              schema:
                type: object
                properties:
                  datasets:
                    type: array
                    items:
                      $ref: '#/components/schemas/TestDataSet'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication
    mcp:
      type: http
      scheme: bearer
      bearerFormat: MCP
      description: Model Context Protocol token

  schemas:
    PipelineSummary:
      type: object
      required:
        - id
        - name
        - type
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [regression, extension, integration, unit]
        triggers:
          type: array
          items:
            type: string
            enum: [manual, commit, pull_request, schedule, api]
        estimatedDuration:
          type: integer
          description: Estimated duration in seconds
        lastExecution:
          type: object
          properties:
            id:
              type: string
              format: uuid
            status:
              type: string
            timestamp:
              type: string
              format: date-time

    ExecutionDetails:
      type: object
      required:
        - id
        - pipelineId
        - status
        - startedAt
      properties:
        id:
          type: string
          format: uuid
        pipelineId:
          type: string
        status:
          type: string
          enum: [pending, running, passed, failed, cancelled, timeout]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        duration:
          type: integer
          description: Duration in milliseconds
        progress:
          type: object
          properties:
            percentage:
              type: number
              minimum: 0
              maximum: 100
            currentPhase:
              type: string
            phasesCompleted:
              type: integer
            phasesTotal:
              type: integer
        summary:
          type: object
          properties:
            total:
              type: integer
            passed:
              type: integer
            failed:
              type: integer
            skipped:
              type: integer
        triggeredBy:
          type: object
          properties:
            type:
              type: string
            identity:
              type: string
            metadata:
              type: object

    Artifact:
      type: object
      required:
        - id
        - type
        - name
        - size
      properties:
        id:
          type: string
        type:
          type: string
          enum: [log, report, coverage, screenshot, video]
        name:
          type: string
        path:
          type: string
        size:
          type: integer
          description: Size in bytes
        mimeType:
          type: string
        createdAt:
          type: string
          format: date-time
        downloadUrl:
          type: string
          format: uri

    TestDataSet:
      type: object
      required:
        - id
        - name
        - version
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
          pattern: '^\d+\.\d+\.\d+$'
        description:
          type: string
        type:
          type: string
          enum: [project, fixture, mock]
        tags:
          type: array
          items:
            type: string
        size:
          type: integer
          description: Size in bytes
        createdAt:
          type: string
          format: date-time

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
        suggestions:
          type: array
          items:
            type: string
        documentation:
          type: string
          format: uri

    RetryGuidance:
      type: object
      properties:
        retryable:
          type: boolean
        retryAfter:
          type: integer
          description: Seconds to wait before retry
        maxRetries:
          type: integer
        strategy:
          type: string
          enum: [exponential, linear, immediate]

  responses:
    BadRequest:
      description: Bad request - invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized - invalid or missing credentials
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  code:
                    example: UNAUTHORIZED

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  code:
                    example: NOT_FOUND

    Conflict:
      description: Conflict - operation cannot be performed
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - $ref: '#/components/schemas/RetryGuidance'
