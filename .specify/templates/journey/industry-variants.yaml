# Industry Variant Templates for Journey Generation
#
# These templates define industry-specific patterns and innovations
# that can be applied when generating journey variants.
#
# @see spec.md FR-017 through FR-020

industries:
  retail:
    name: Retail
    keywords:
      - shopping
      - cart
      - checkout
      - inventory
      - product catalog
    patterns:
      - Abandoned cart recovery
      - Personalized recommendations
      - Loyalty programs
      - Omnichannel experience
      - Real-time inventory sync
    innovations:
      - AI-powered virtual try-on
      - Voice commerce integration
      - AR product visualization
      - Predictive inventory management
      - Hyper-personalization via ML
    touchpoints:
      - Mobile app
      - Website
      - In-store kiosk
      - Customer service chat
      - Email/SMS notifications

  healthcare:
    name: Healthcare
    keywords:
      - patient
      - appointment
      - medical
      - health records
      - diagnosis
    patterns:
      - Patient portal access
      - Appointment scheduling
      - Secure messaging
      - Prescription management
      - Telehealth visits
    innovations:
      - AI symptom checker
      - Remote patient monitoring
      - Predictive health analytics
      - Natural language clinical notes
      - Drug interaction AI
    touchpoints:
      - Patient portal
      - Mobile health app
      - Wearable devices
      - Video consultation
      - Pharmacy integration

  finance:
