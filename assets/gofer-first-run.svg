<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Gofer first run demo</title>
  <desc id="desc">A terminal-style preview showing the Gofer bootstrap and first business scenario command.</desc>
  <rect width="960" height="520" rx="28" fill="#0f172a"/>
  <rect x="42" y="38" width="876" height="444" rx="18" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="78" cy="74" r="9" fill="#ef4444"/>
  <circle cx="106" cy="74" r="9" fill="#f59e0b"/>
  <circle cx="134" cy="74" r="9" fill="#22c55e"/>
  <text x="62" y="128" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">$ gofer bootstrap workspace</text>
  <text x="62" y="170" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">checking .specify scaffold...</text>
  <text x="62" y="208" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">created .specify/memory/gofer-model-policy.yaml</text>
  <text x="62" y="246" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">synced Claude, Codex, Copilot, Gemini commands</text>
  <text x="62" y="308" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">$ /0_business_scenario Add passwordless login</text>
  <text x="62" y="350" fill="#fde68a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Gofer asks business, user, risk, and success questions</text>
  <text x="62" y="388" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">writes .specify/specs/passwordless-login/business-scenario.md</text>
  <text x="62" y="426" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">continues to research, specify, plan, tasks, implement, validate</text>
</svg>
