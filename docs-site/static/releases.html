<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Releases - Gofer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/themes/vue.css">
    <link rel="stylesheet" href="assets/css/custom.css">
    <style>
        /* Releases page specific styles */
        .releases-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            overflow: hidden;
            margin-bottom: 30px;
        }
        .releases-header {
            background: var(--bg-dark, #2d3748);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .releases-header h2 { font-size: 1.5rem; margin: 0; }
        .current-version {
            background: var(--theme-color, #4299e1);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .release-item {
            border-bottom: 1px solid #e2e8f0;
            padding: 25px 30px;
            transition: background-color 0.2s;
        }
        .release-item:hover { background-color: #f8fafc; }
        .release-item:last-child { border-bottom: none; }
        .release-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .version-info h3 { font-size: 1.3rem; color: #2d3748; margin: 0 0 5px 0; }
        .release-date { color: #718096; font-size: 0.9rem; }
        .download-btn {
            background: var(--theme-color, #4299e1);
            color: white !important;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none !important;
            font-weight: 500;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .download-btn:hover { background: var(--theme-color-dark, #3182ce); }
        .download-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .download-btn.secondary {
            background: #2d3748;
        }
        .download-btn.secondary:hover {
            background: #1a202c;
        }
        .release-notes {
            background: var(--bg-light, #f7fafc);
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid var(--theme-color, #4299e1);
        }
        .release-notes h4 { margin: 0 0 10px 0; color: #2d3748; }
        .release-notes ul { margin-left: 20px; }
        .release-notes li { margin-bottom: 5px; }
        .installation-guide {
            background: var(--bg-success, #f0fff4);
            border: 1px solid var(--border-success, #9ae6b4);
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
        }
        .installation-guide h3 { color: #2f855a; margin: 0 0 15px 0; }
        .installation-steps { margin-left: 20px; }
        .installation-steps li { margin-bottom: 8px; }
        .installation-steps .code-inline {
            background: #2d3748;
            color: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.9rem;
        }
        .loading { text-align: center; padding: 40px; color: #718096; }
        .error {
            background: #fed7d7;
            border: 1px solid #feb2b2;
            color: #c53030;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }
        @media (max-width: 768px) {
            .release-header { flex-direction: column; align-items: flex-start; }
            .release-item { padding: 20px; }
        }
        @media (max-width: 375px) {
            .release-item { padding: 15px; }
            .releases-header { padding: 15px 20px; }
        }
        body { margin: 0; }
        .app-nav {
            position: static;
            background: var(--bg-dark, #2d3748);
            padding: 12px 30px;
            text-align: right;
        }
        .app-nav ul {
            list-style: none;
            display: flex;
            justify-content: flex-end;
            gap: 22px;
            margin: 0;
            padding: 0;
        }
        .app-nav a { color: #e2e8f0; text-decoration: none; font-weight: 500; }
        .app-nav a:hover, .app-nav li.active a { color: var(--theme-color, #4299e1); }
        #app {
            max-width: 920px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        #app > h1 { color: #2d3748; }
    </style>
</head>
<body>
    <div id="app">
        <p>Loading...</p>
    </div>
    <script>
        // Custom navbar with absolute links back to the main Docusaurus site.
        function renderNav() {
            if (document.querySelector('nav.app-nav')) return;
            var nav = document.createElement('nav');
            nav.className = 'app-nav';
            nav.innerHTML =
                '<ul>' +
                    '<li><a href="/eai-gofer/">Home</a></li>' +
                    '<li><a href="/eai-gofer/#/quickstart">Quick Start</a></li>' +
                    '<li><a href="/eai-gofer/#/pipeline/README">Pipeline</a></li>' +
                    '<li class="active"><a href="/eai-gofer/releases.html">Releases</a></li>' +
                    '<li><a href="https://github.com/eai-tools/eai-gofer">GitHub</a></li>' +
                '</ul>';
            document.body.insertBefore(nav, document.body.firstChild);
        }

        function renderReleaseShell() {
            var content = document.getElementById('app');
            if (!content) return;
            if (content.querySelector('.releases-container')) return;
            content.innerHTML =
                '<h1>Releases</h1>' +
                '<div class="releases-container">' +
                    '<div class="releases-header">' +
                        '<h2>Available Releases</h2>' +
                        '<span class="current-version" id="currentVersion">Loading...</span>' +
                    '</div>' +
                    '<div id="releasesContent">' +
                        '<div class="loading"><p>Loading releases...</p></div>' +
                    '</div>' +
                '</div>' +
                '<div class="installation-guide">' +
                    '<h3>Installation Instructions</h3>' +
                    '<ol class="installation-steps">' +
                        '<li>Download the latest <span class="code-inline">.vsix</span> file from above</li>' +
                        '<li>Open VS Code</li>' +
                        '<li>Press <span class="code-inline">Cmd+Shift+P</span> (macOS) or <span class="code-inline">Ctrl+Shift+P</span> (Windows/Linux)</li>' +
                        '<li>Type "Extensions: Install from VSIX"</li>' +
                        '<li>Select the downloaded <span class="code-inline">.vsix</span> file</li>' +
                        '<li>Restart VS Code</li>' +
                        '<li>Open a workspace with a <span class="code-inline">.specify/</span> folder to activate Gofer</li>' +
                    '</ol>' +
                    '<p><strong>Agent surfaces:</strong> use the public GitHub repo <span class="code-inline">https://github.com/eai-tools/eai-gofer</span> as the install source for Claude, Codex, Copilot, and Gemini. Use the release card here for VSIX and downloadable zip artifacts.</p>' +
                '</div>';
            loadReleases();
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderNav();
            renderReleaseShell();
        });

        async function loadReleases() {
            try {
                var response;
                try {
                    response = await fetch('./releases.json');
                } catch (e) {
                    response = await fetch('https://eai-tools.github.io/eai-gofer/releases.json');
                }
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ': ' + response.statusText);
                }
                var data = await response.json();
                displayReleases(data);
            } catch (error) {
                displayError('Failed to load releases: ' + error.message + '. Please refresh the page or try again later.');
            }
        }

        function displayReleases(data) {
            var currentVersionEl = document.getElementById('currentVersion');
            var contentEl = document.getElementById('releasesContent');
            if (!currentVersionEl || !contentEl) return;
            if (!data.releases || data.releases.length === 0) {
                displayError('No releases available yet.');
                return;
            }
            currentVersionEl.textContent = 'v' + data.latest_version;
            var releasesHTML = data.releases.map(function(release, i) {
                var downloadButtons = [
                    '<a href="' + escapeHtml(release.download_url) + '" class="download-btn">Download VSIX</a>'
                ];
                if (release.assets && release.assets.claude && release.assets.claude.download_url) {
                    downloadButtons.push(
                        '<a href="' + escapeHtml(release.assets.claude.download_url) + '" class="download-btn secondary">Download Agent Plugin Zip</a>'
                    );
                }
                if (release.assets && release.assets.claude && release.assets.claude.marketplace_url) {
                    downloadButtons.push(
                        '<a href="' + escapeHtml(release.assets.claude.marketplace_url) + '" class="download-btn secondary">Open Claude Marketplace</a>'
                    );
                }
                if (release.assets && release.assets.claude && release.assets.claude.bundle_url) {
                    downloadButtons.push(
                        '<a href="' + escapeHtml(release.assets.claude.bundle_url) + '" class="download-btn secondary">Open Public Plugin Bundle</a>'
                    );
                }
                if (release.assets && release.assets.codex && release.assets.codex.manifest_url) {
                    downloadButtons.push(
                        '<a href="' + escapeHtml(release.assets.codex.manifest_url) + '" class="download-btn secondary">Open Codex Manifest</a>'
                    );
                }
                if (release.assets && release.assets.copilot && release.assets.copilot.marketplace_url) {
                    downloadButtons.push(
                        '<a href="' + escapeHtml(release.assets.copilot.marketplace_url) + '" class="download-btn secondary">Open Copilot Marketplace</a>'
                    );
                }
                if (release.assets && release.assets.gemini && release.assets.gemini.manifest_url) {
                    downloadButtons.push(
                        '<a href="' + escapeHtml(release.assets.gemini.manifest_url) + '" class="download-btn secondary">Open Gemini Manifest</a>'
                    );
                }
                return '<div class="release-item">' +
                    '<div class="release-header">' +
                        '<div class="version-info">' +
                            '<h3>Version ' + escapeHtml(release.version) + (i === 0 ? ' (Latest)' : '') + '</h3>' +
                            '<div class="release-date">' + formatDate(release.published_at) + '</div>' +
                        '</div>' +
                        '<div class="download-row">' + downloadButtons.join('') + '</div>' +
                    '</div>' +
                    '<div class="release-notes">' +
                        '<h4>Release Notes</h4>' +
                        '<div>' + formatReleaseNotes(release.notes) + '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
            contentEl.innerHTML = releasesHTML;
        }

        function displayError(message) {
            var contentEl = document.getElementById('releasesContent');
            if (contentEl) {
                contentEl.innerHTML = '<div class="error">' + escapeHtml(message) + '</div>';
            }
        }

        function formatDate(dateString) {
            var date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function formatReleaseNotes(notes) {
            return escapeHtml(notes)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
