<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofer - Spec-Driven Development for AI</title>
    <meta name="description" content="Let AI assistants autonomously implement features from specifications using VSCode's native MCP support.">
    <meta property="og:title" content="Gofer - Spec-Driven Development for AI">
    <meta property="og:description" content="AI-powered spec-driven development for VS Code. Let Claude Code and GitHub Copilot autonomously implement features from specifications.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://eai-tools.github.io/gofer/">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/themes/vue.css">
    <link rel="stylesheet" href="assets/css/custom.css">
    <style>
        /* Loading state before Docsify initializes */
        #app { max-width: 1200px; margin: 0 auto; padding: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <noscript>
            <div style="max-width: 800px; margin: 40px auto; padding: 20px; font-family: -apple-system, sans-serif; text-align: center;">
                <h1>Gofer Documentation</h1>
                <p>This documentation site requires JavaScript to render. Please enable JavaScript in your browser settings.</p>
                <p>Alternatively, view the documentation directly on <a href="https://github.com/eai-tools/gofer">GitHub</a>.</p>
            </div>
        </noscript>
        <p>Loading documentation...</p>
    </div>
    <!-- Docsify configuration -->
    <script>
        window.$docsify = {
            name: 'Gofer',
            repo: 'https://github.com/eai-tools/gofer',
            loadSidebar: true,
            loadNavbar: true,
            subMaxLevel: 3,
            auto2top: true,
            search: {
                placeholder: 'Search documentation...',
                noData: 'No results found.',
                paths: 'auto',
                maxAge: 86400000
            },
            copyCode: {
                buttonText: 'Copy',
                successText: 'Copied'
            },
            pagination: {
                previousText: 'Previous',
                nextText: 'Next',
                crossChapter: true
            },
            plugins: [
                function(hook) {
                    hook.doneEach(function() {
                        var el = document.getElementById('latestRelease');
                        if (!el) return;
                        fetch('./releases.json')
                            .then(function(r) { return r.json(); })
                            .then(function(data) {
                                if (data.latest_version) {
                                    el.innerHTML =
                                        '<h3>Latest Release</h3>' +
                                        '<span class="version-badge">v' + data.latest_version + '</span>' +
                                        '<p style="margin-top: 8px">' + data.releases[0].notes.replace(/</g, '&lt;') + '</p>' +
                                        '<a href="/gofer/releases.html" class="download-link">View all releases &rarr;</a>';
                                }
                            })
                            .catch(function() {
                                el.innerHTML =
                                    '<h3>Latest Release</h3>' +
                                    '<a href="/gofer/releases.html" class="download-link">View releases &rarr;</a>';
                            });
                    });
                }
            ]
        };
    </script>
    <!-- Docsify core -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>
    <!-- Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
    <!-- Syntax highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
